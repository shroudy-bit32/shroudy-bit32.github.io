<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADS - 352 Örnek Sitesi</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0,0,0,0.4);
            max-width: 600px;
            width: 90%;
            transition: 0.4s ease;
        }

        .container:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .buttons a {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: 0.3s ease;
            border: 2px solid white;
        }

        .buttons a:hover {
            background: white;
            color: #203a43;
            transform: scale(1.05);
        }

        footer {
            margin-top: 25px;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        @media(max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }

            .container {
                padding: 35px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Bu site ADS - 352 açık kaynak yazılım geliştirme dersi için oluşturulmuştur </h1>
        <p>Açık kaynak yazılım dersi</p>

        <div class="buttons">
            <a href="#">GitHub</a>
            <a href="#">LinkedIn</a>
            <a href="#">Projelerim</a>
        </div>

        <footer>
            © 2026 ADS-352
        </footer>
    </div>

</body>
</html>
